<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Barang Temuan | Takmir Panel</title>
    <style>
        :root { --primary: #0f766e; --gold: #d4af37; --text: #1e293b; --border: #e2e8f0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; color: var(--text); margin: 0; }
        
        nav { background: var(--primary); color: white; padding: 15px 40px; border-bottom: 3px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; font-weight: 600; }
        
        .container { width: min(600px, 92%); margin: 50px auto; background: white; padding: 35px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 4px solid var(--gold); }
        h2 { color: var(--primary); margin-bottom: 20px; }
        
        label { display: block; margin-top: 12px; font-weight: 600; color: #475569; }
        input, select { width: 100%; padding: 12px; margin-top: 6px; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-size: 0.95rem; background: #f8fafc; }
        input:focus, select:focus { outline: none; border-color: var(--primary); background: #fff; }
        
        .btn { background: var(--primary); color: white; border: none; padding: 14px; margin-top: 25px; width: 100%; font-size: 1rem; font-weight: 700; border-radius: 30px; cursor: pointer; }
        .btn:hover { background: #0b5e57; }
    </style>
</head>
<body>

    <nav>
        <span>NurzaFind Admin Panel</span>
        <a href="admin.html">← Kembali ke Dashboard</a>
    </nav>

    <div class="container">
        <h2>📝 Input Log Barang Temuan Baru</h2>
        <form id="formBarang">
            <label>Nama Barang</label>
            <input type="text" id="namaBarang" placeholder="Contoh: Kunci Motor Honda, Dompet Coklat" required>

            <label>Kategori</label>
            <select id="kategori">
                <option value="Elektronik">Elektronik / Gadget</option>
                <option value="Dokumen">Dokumen / Dompet</option>
                <option value="Perlengkapan Ibadah">Perlengkapan Ibadah</option>
                <option value="Lain-lain">Lain-lain</option>
            </select>

            <label>Lokasi Penemuan</label>
            <input type="text" id="lokasi" placeholder="Contoh: Tangga Lantai 1, Shaf Pria" required>

            <label>Link Url Foto Barang</label>
            <input type="url" id="fotoBarang" placeholder="Masukkan URL gambar barang (https://...)" required>

            <button type="submit" class="btn">🚀 Upload & Publikasikan Barang</button>
        </form>
    </div>

    <script>
        document.getElementById('formBarang').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Inovasi perbaikan: Membuat ID unik berbasis Timestamp waktu terkini agar tidak akan pernah tertukar
            const uniqueId = "NRZ-" + Date.now().toString().slice(-4);
            
            const barangBaru = {
                id: uniqueId,
                nama: document.getElementById('namaBarang').value,
                kategori: document.getElementById('kategori').value,
                lokasi: document.getElementById('lokasi').value,
                foto: document.getElementById('fotoBarang').value,
                tanggal: new Date().toISOString().split('T')[0],
                status: 'Tersedia'
            };

            let daftarBarang = JSON.parse(localStorage.getItem('databaseBarang')) || [];
            daftarBarang.unshift(barangBaru);
            localStorage.setItem('databaseBarang', JSON.stringify(daftarBarang));

            alert('Barang sukses dipublikasikan dengan ID: ' + uniqueId);
            window.location.href = "admin.html";
        });
    </script>
</body>
</html>
