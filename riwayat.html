<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Pengambilan | NurzaFind</title>
    <style>
        :root {
            --primary: #0f766e;
            --primary-dark: #0b5e57;
            --gold: #d4af37;
            --text: #1e293b;
            --muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 10px 30px rgba(15, 118, 110, 0.05);
            --radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; color: var(--text); }

        nav { background: #ffffff; border-bottom: 3px solid var(--gold); padding: 15px 0; }
        .nav-container { width: min(1140px, 92%); margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 1.4rem; color: var(--primary); text-decoration: none; }
        .logo img { height: 35px; }
        nav ul { display: flex; list-style: none; gap: 15px; }
        nav a { text-decoration: none; color: #475569; font-weight: 600; padding: 8px 16px; }
        nav a.active { color: var(--primary); background: #f1f5f9; border-radius: 8px; }

        main { width: min(1140px, 92%); margin: 40px auto; }
        .header-section { text-align: center; margin-bottom: 30px; }
        .header-section h1 { color: var(--primary); font-size: 2rem; margin-bottom: 8px; }

        .search-bar { width: 100%; max-width: 500px; margin: 0 auto 40px auto; display: block; padding: 12px 20px; border: 1px solid var(--border); border-radius: 30px; outline: none; font-size: 0.95rem; background: #fff; box-shadow: var(--shadow); }

        .riwayat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .riwayat-card { background: #ffffff; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow); display: flex; gap: 15px; padding: 15px; }
        .riwayat-card img { width: 100px; height: 100px; object-fit: cover; border-radius: 10px; background: #e2e8f0; }
        
        .riwayat-info { display: flex; flex-direction: column; gap: 4px; font-size: 0.85rem; color: #475569; }
        .riwayat-info h3 { color: var(--text); font-size: 1.05rem; margin-bottom: 2px; }
        .riwayat-info .kode { font-weight: bold; color: var(--gold); margin: 2px 0; }
        
        .badge { width: fit-content; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; margin-top: 4px; background: #dcfce7; color: #166534; }
    </style>
</head>

<body>

    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo"><img src="assets/logo.png" alt="Logo"><span>NurzaFind</span></a>
            <ul>
                <li><a href="index.html">Beranda</a></li>
                <li><a href="cari-barang.html">Cari Barang</a></li>
                <li><a href="riwayat.html" class="active">Riwayat</a></li>
                <li><a href="login.html">Admin</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <div class="header-section">
            <h1>🔱 Riwayat Pengembalian Barang</h1>
            <p>Daftar transparansi serah terima log barang temuan kepada pemilik sah.</p>
        </div>

        <input type="text" id="filterInput" class="search-bar" placeholder="Cari nama barang atau ID klaim..." onkeyup="filterRiwayat()">

        <div class="riwayat-grid" id="riwayatContainer">
            <div class="riwayat-card">
                <img src="https://down-id.img.susercontent.com/file/id-11134207-7r98p-llwywsvj3fs10c" alt="Kotak Pensil">
                <div class="riwayat-info">
                    <h3>Kotak Pensil Kain</h3>
                    <p>👤 <strong>Pemilik:</strong> Budi Santoso</p>
                    <p class="kode">📄 Klaim: NRZ-003</p>
                    <p>📅 <strong>Diambil:</strong> 2026-06-27</p>
                    <p>📍 <strong>Lokasi:</strong> Pos Takmir</p>
                    <span class="badge">🔱 Sukses Dikembalikan</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        function filterRiwayat() {
            let val = document.getElementById("filterInput").value.toLowerCase();
            let items = document.querySelectorAll(".riwayat-card");
            
            items.forEach(item => {
                let text = item.innerText.toLowerCase();
                item.style.display = text.includes(val) ? "flex" : "none";
            });
        }
    </script>
</body>
</html>
