<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Barang - NurzaFind</title>
    <style>
        :root {
            --primary: #0f766e;
            --primary-dark: #0b5e57;
            --gold: #d4af37;
            --gold-light: #fbf7eb;
            --text: #1e293b;
            --border: #e2e8f0;
            --shadow: 0 10px 30px rgba(15, 118, 110, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; color: var(--text); }

        nav {
            background: #ffffff; border-bottom: 3px solid var(--gold); padding: 15px 0;
        }
        .nav-container { width: min(1140px, 92%); margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 1.4rem; color: var(--primary); text-decoration: none; }
        .logo img { height: 35px; }
        nav ul { display: flex; list-style: none; gap: 15px; }
        nav a { text-decoration: none; color: #475569; font-weight: 600; padding: 8px 16px; }

        .detail-container {
            width: min(1000px, 92%); margin: 50px auto; background: #ffffff;
            border-radius: 16px; box-shadow: var(--shadow); display: grid;
            grid-template-columns: 1fr 1fr; overflow: hidden; border-top: 4px solid var(--gold);
        }

        @media (max-width: 768px) {
            .detail-container { grid-template-columns: 1fr; }
        }

        .detail-image { background: #cbd5e1; display: flex; align-items: center; justify-content: center; min-height: 300px; }
        .detail-image img { width: 100%; height: 100%; object-fit: cover; }

        .detail-info { padding: 40px; display: flex; flex-direction: column; gap: 20px; }
        .detail-info h1 { color: var(--primary); font-size: 2rem; margin-bottom: 10px; }
        .detail-info p { font-size: 1.05rem; color: #475569; }

        .btn-klaim {
            background: var(--primary); color: white; text-decoration: none;
            padding: 14px 28px; font-weight: 700; border-radius: 30px; display: inline-block;
            text-align: center; width: fit-content; transition: background 0.2s; margin-top: 10px;
        }
        .btn-klaim:hover { background: var(--primary-dark); }
        .btn-disabled { background: #cbd5e1; color: #94a3b8; cursor: not-allowed; pointer-events: none; }
    </style>
</head>

<body>

    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo"><img src="assets/logo.png" alt="Logo"><span>NurzaFind</span></a>
            <ul>
                <li><a href="index.html">Beranda</a></li>
                <li><a href="cari-barang.html">Cari Barang</a></li>
                <li><a href="riwayat.html">Riwayat</a></li>
                <li><a href="login.html">Admin</a></li>
            </ul>
        </div>
    </nav>

    <main class="detail-container">
        <div class="detail-image">
            <img id="detailFoto" src="assets/dompet.jpg" alt="Foto Barang">
        </div>

        <div class="detail-info">
            <h1 id="detailNama">Memuat Data Barang...</h1>
            <p><b>📍 Lokasi:</b> <span id="detailLokasi">-</span></p>
            <p><b>📅 Tanggal:</b> <span id="detailTanggal">-</span></p>
            <p><b>🟢 Status:</b> <span id="detailStatus" style="color:#166534; font-weight:bold;">-</span></p>
            
            <a href="#" id="btnClaimAction" class="btn-klaim">Ajukan Klaim</a>
        </div>
    </main>

    <script>
        // Membaca Parameter ID Barang dari URL
        const urlParams = new URLSearchParams(window.location.search);
        const barangId = urlParams.get('id');

        // Memuat Database Barang dari LocalStorage
        let masterDataBarang = JSON.parse(localStorage.getItem("databaseBarang")) || [];
        let barangDitemukan = masterDataBarang.find(b => b.id === barangId);

        if (barangDitemukan) {
            // Update Tampilan secara Dinamis
            document.getElementById("detailNama").innerText = barangDitemukan.nama;
            document.getElementById("detailLokasi").innerText = barangDitemukan.lokasi;
            document.getElementById("detailTanggal").innerText = barangDitemukan.tanggal;
            document.getElementById("detailFoto").src = barangDitemukan.foto;
            
            let statusText = barangDitemukan.status;
            let statusEl = document.getElementById("detailStatus");
            statusEl.innerText = statusText;

            let btnClaim = document.getElementById("btnClaimAction");

            if (statusText !== "Tersedia") {
                statusEl.style.color = "#92400e"; // Kuning kecokelatan untuk pending/terklaim
                btnClaim.innerText = "Barang Terklaim";
                btnClaim.classList.add("btn-disabled");
            } else {
                statusEl.style.color = "#166534"; // Hijau untuk tersedia
                btnClaim.href = `klaim.html?id=${barangDitemukan.id}`;
            }
        } else {
            document.getElementById("detailNama").innerText = "⚠️ Data Barang Tidak Ditemukan";
        }
    </script>
    
</body>
</html>
