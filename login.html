<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - NurzaFind</title>
    <style>
        :root {
            --primary: #0f766e;
            --primary-dark: #0b5e57;
            --gold: #d4af37;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; height: 100vh; display: flex; align-items: center; justify-content: center; }

        .card-login { background: #ffffff; width: min(400px, 90%); padding: 35px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 4px solid var(--gold); }
        .card-login h1 { color: var(--primary); text-align: center; font-size: 1.7rem; margin-bottom: 8px; }
        .card-login p { text-align: center; color: #64748b; font-size: 0.9rem; margin-bottom: 25px; line-height: 1.4; }

        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
        label { font-weight: 600; color: #475569; font-size: 0.9rem; }
        input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.95rem; outline: none; background: #f8fafc; }
        input:focus { border-color: var(--primary); background: #ffffff; }

        .btn { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 30px; font-weight: 700; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .btn:hover { background: var(--primary-dark); }
        .back { display: block; text-align: center; margin-top: 15px; color: var(--primary); text-decoration: none; font-size: 0.9rem; font-weight: 600; }
    </style>
</head>

<body>

    <div class="card-login">
        <h1>Login Takmir</h1>
        <p>Halaman ini hanya dapat diakses oleh pengelola Masjid Nuruzzaman.</p>

        <div class="form-body">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="admin@nurzafind.id">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="******">
            </div>
            <button class="btn" type="button" onclick="loginAdminMurni()">Login</button>
        </div>

        <a href="index.html" class="back">← Kembali ke Beranda Utama</a>
    </div>

    <script>
        function loginAdminMurni() {
            let emailInput = document.getElementById("email").value.trim();
            let passwordInput = document.getElementById("password").value.trim();

            // Pengecekan Akun
            if (emailInput === "admin@nurzafind.id" && passwordInput === "123456") {
                alert("Login Sukses! Selamat datang di Panel Takmir.");
                localStorage.setItem("isLoggedIn", "true");
                
                // Pindah langsung ke halaman utama admin
                window.location.replace("admin.html");
            } else {
                alert("Email atau password takmir salah! Periksa kembali ketikan Anda.");
            }
        }
    </script>
</body>
</html>
