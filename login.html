<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - NurzaFind</title>
    <style>
        :root {
            --primary: #0f766e;
            --primary-dark: #0b5e57;
            --gold: #d4af37;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; height: 100vh; display: flex; align-items: center; justify-content: center; }

        .card-login { background: #ffffff; width: min(400px, 90%); padding: 35px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 4px solid var(--gold); }
        .card-login h1 { color: var(--primary); text-align: center; font-size: 1.7rem; margin-bottom: 8px; }
        .card-login p { text-align: center; color: #64748b; font-size: 0.9rem; margin-bottom: 25px; }

        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 15px; }
        label { font-weight: 600; font-size: 0.88rem; color: var(--primary); }
        input { padding: 12px; border: 1px solid var(--border); border-radius: 8px; outline: none; background: #f8fafc; font-size: 0.95rem; }
        input:focus { border-color: var(--primary); background: #fff; }

        .btn { width: 100%; background: var(--primary); color: white; border: none; padding: 12px; font-weight: bold; border-radius: 25px; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .btn:hover { background: var(--primary-dark); }
        .back { display: block; text-align: center; margin-top: 15px; color: var(--primary); text-decoration: none; font-size: 0.9rem; font-weight: 600; }
    </style>
</head>

<body>

    <div class="card-login">
        <h1>Login Takmir</h1>
        <p>Halaman ini hanya dapat diakses oleh pengelola Masjid Nuruzzaman.</p>

        <form onsubmit="event.preventDefault(); loginAdmin();">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button class="btn" type="submit">Login</button>
        </form>

        <a href="index.html" class="back">← Kembali ke Beranda Utama</a>
    </div>

    <script>
        function loginAdmin() {
            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;

            if (email === "admin@nurzafind.id" && password === "123456") {
                localStorage.setItem("login", "true");
                window.location.href = "admin.html";
            } else {
                alert("❌ Email atau password salah!");
            }
        }
    </script>
</body>
</html>
